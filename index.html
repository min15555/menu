<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2F6B4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>58회 국내외성경탐구모임 · 식당 메뉴</title>
<style>

  :root{
    --paper:#FBFAF6; --card:#FFFFFF;
    --ink:#232A22; --ink-soft:#657061;
    --line:#E8E7DD;
    --green:#2F6B4F; --green-d:#245239; --green-soft:#E6F0E9;
    --lunch:#D98A1E; --lunch-soft:#FBEDD3;
    --dinner:#6B4E86; --dinner-soft:#EDE6F3;
    --radius:18px; --shadow:0 8px 24px rgba(35,42,34,.08);
    --font:"Noto Sans KR","Noto Sans Thai","Noto Sans",system-ui,-apple-system,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--font);
    line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:0 18px 64px}

  /* Header */
  header.top{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:22px 4px 18px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .plate{
    width:44px;height:44px;flex:0 0 44px;border-radius:50%;
    background:var(--green);color:#fff;display:grid;place-items:center;font-size:22px;
    box-shadow:var(--shadow);
  }
  .brand h1{font-size:20px;font-weight:900;margin:0;letter-spacing:-.2px;line-height:1.25}
  .subtitle{
    font-size:14px;font-weight:700;color:var(--green-d);
    background:var(--green-soft);border:1px solid #D4E6DA;
    padding:7px 14px;border-radius:999px;white-space:nowrap;
  }

  /* Language tabs */
  .tabs-shell{position:sticky;top:0;z-index:40;background:var(--paper);
    padding:8px 0 10px;border-bottom:1px solid var(--line);margin:0 -18px 0;padding-left:18px;padding-right:18px}
  .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;display:flex;align-items:center;gap:7px;cursor:pointer;
    border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);
    padding:9px 15px;border-radius:999px;font-family:inherit;font-size:14.5px;font-weight:700;
    transition:transform .12s ease, background .12s ease, color .12s ease, border-color .12s ease;
  }
  .tab .flag{font-size:17px;line-height:1}
  .tab:hover{transform:translateY(-1px)}
  .tab.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:var(--shadow)}

  /* Greeting hero */
  .greeting{
    margin:20px 0 8px;background:linear-gradient(135deg,var(--green) 0%,var(--green-d) 100%);
    color:#fff;border-radius:var(--radius);padding:26px 26px 24px;box-shadow:var(--shadow);
    position:relative;overflow:hidden;
  }
  .greeting::after{content:"🍽️";position:absolute;right:-8px;bottom:-18px;font-size:120px;opacity:.10;transform:rotate(-12deg)}
  .greeting .hello{font-size:30px;font-weight:900;margin:0 0 6px;letter-spacing:-.3px}
  .greeting .msg{font-size:15.5px;font-weight:500;margin:0;max-width:640px;opacity:.96}

  /* Days */
  .days{margin-top:22px;display:flex;flex-direction:column;gap:20px}
  .day{background:transparent}
  .day-head{display:flex;align-items:baseline;gap:12px;margin:2px 2px 12px}
  .day-head .date{font-size:19px;font-weight:900;color:var(--ink)}
  .day-head .wd{font-size:14px;font-weight:700;color:var(--ink-soft);
    background:#fff;border:1px solid var(--line);padding:3px 11px;border-radius:999px}
  .meals{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  .meal{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px 14px;display:flex;flex-direction:column;min-height:120px;
    transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
  }
  .meal.clickable{cursor:pointer}
  .meal.clickable:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#dcd9cc}
  .meal.clickable:active{transform:translateY(-1px)}
  .meal-head{display:flex;align-items:center;gap:9px;margin-bottom:11px;padding-bottom:11px;border-bottom:1px dashed var(--line)}
  .m-icon{font-size:19px}
  .m-title{font-size:15px;font-weight:900;letter-spacing:.2px}
  .meal.lunch .meal-head{color:var(--lunch)}
  .meal.lunch{border-top:4px solid var(--lunch)}
  .meal.dinner .meal-head{color:var(--dinner)}
  .meal.dinner{border-top:4px solid var(--dinner)}

  ul.dishes{list-style:none;margin:0;padding:0;flex:1;display:flex;flex-direction:column;gap:7px}
  ul.dishes li{display:flex;align-items:flex-start;gap:9px;font-size:15px;font-weight:500}
  ul.dishes li .d-ico{font-size:16px;line-height:1.4;flex:0 0 auto}
  ul.dishes li .d-name{color:var(--ink)}
  ul.dishes li .d-warn{font-size:12px;line-height:1.4;flex:0 0 auto;margin-left:2px;opacity:.9}
  .tap-hint{margin-top:12px;font-size:12.5px;font-weight:700;color:var(--ink-soft);opacity:.8;align-self:flex-end}
  .meal.lunch .tap-hint{color:var(--lunch)}
  .meal.dinner .tap-hint{color:var(--dinner)}

  .meal.tba{background:#F7F6F1;border-style:dashed;justify-content:center;align-items:center;text-align:center}
  .meal.tba .tba-txt{color:var(--ink-soft);font-weight:700;font-size:14px;opacity:.75}

  footer.note{margin-top:30px;text-align:center;font-size:13px;color:var(--ink-soft);
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px}

  /* Modal */
  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center}
  .modal.open{display:flex}
  .modal::before{content:"";position:absolute;inset:0;background:rgba(30,35,28,.5);backdrop-filter:blur(2px)}
  .sheet{
    position:relative;background:var(--paper);width:100%;max-width:620px;
    border-radius:22px 22px 0 0;max-height:88vh;display:flex;flex-direction:column;
    box-shadow:0 -10px 40px rgba(0,0,0,.25);animation:rise .28s cubic-bezier(.2,.8,.2,1)
  }
  @keyframes rise{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:18px 20px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);border-radius:22px 22px 0 0}
  .sheet-head .st{font-size:16px;font-weight:900;color:var(--ink)}
  .x{border:none;background:#EFEEE7;color:var(--ink);width:34px;height:34px;border-radius:50%;
    font-size:18px;cursor:pointer;flex:0 0 34px;font-family:inherit;line-height:1}
  .x:hover{background:#e4e2d8}
  .sheet-body{padding:14px 18px 26px;overflow-y:auto}

  .dish{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:12px}
  .dish:last-child{margin-bottom:0}
  .dish-top{display:flex;align-items:flex-start;gap:11px}
  .dish-ico{font-size:26px;line-height:1.1;flex:0 0 auto}
  .dish-name{font-size:17px;font-weight:900;color:var(--ink);line-height:1.3}
  .dish-kor{font-size:12.5px;color:var(--ink-soft);font-weight:500;margin-top:1px}
  .dish-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
  .tag{font-size:12px;font-weight:700;color:var(--green-d);background:var(--green-soft);
    border:1px solid #D4E6DA;padding:3px 9px;border-radius:999px}
  .allergen-box{margin:10px 0 2px;background:#FDF1EE;border:1px solid #F3C9BF;border-radius:12px;padding:9px 11px}
  .al-title{font-size:12.5px;font-weight:900;color:#B23A1E;display:flex;align-items:center;gap:5px;margin-bottom:7px;letter-spacing:.01em}
  .al-warn{font-size:13px}
  .al-list{display:flex;flex-wrap:wrap;gap:6px}
  .al{font-size:12px;font-weight:800;color:#fff;background:#D9603F;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .dish-desc{font-size:14.5px;color:var(--ink);margin:10px 0 0}
  .dish-ing{font-size:13.5px;color:var(--ink-soft);margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
  .ing-label{font-weight:800;color:var(--ink);margin-right:4px}

  @media (max-width:640px){
    .brand h1{font-size:17px}
    .greeting .hello{font-size:25px}
    .meals{grid-template-columns:1fr}
    .subtitle{font-size:13px;padding:6px 12px}
    .modal{align-items:flex-end}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
/* ===== 추가·모바일·언어선택 스타일 (원본 뒤 → 우선 적용) ===== */
html{-webkit-text-size-adjust:100%}
:root{--font:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR","Segoe UI",Roboto,"Noto Sans Thai","Helvetica Neue",Arial,sans-serif;}
body{overflow-x:hidden}

/* header: 제목 + 언어변경 버튼 */
.brand-text{min-width:0}
.brand-text h1{font-size:18px;font-weight:900;margin:0;line-height:1.22;letter-spacing:-.2px}
.brand-text .subtitle{font-size:12.5px;font-weight:600;color:var(--ink-soft);background:none;border:none;padding:0;border-radius:0;white-space:normal;margin-top:2px;display:block}
.lang-btn{display:flex;align-items:center;gap:6px;background:var(--green-soft);border:1.5px solid #D4E6DA;
  color:var(--green-d);font-family:inherit;font-size:14px;font-weight:800;padding:9px 13px;border-radius:999px;
  cursor:pointer;flex:0 0 auto;touch-action:manipulation}
.lang-btn:hover{background:#dbeade}
.lang-btn .lang-btn-flag{font-size:17px;line-height:1}
.lang-btn .caret{opacity:.55;font-size:12px;margin-left:-1px}

/* 언어 선택 화면 */
.lang-screen{position:fixed;inset:0;z-index:200;background:var(--paper);display:flex;
  align-items:center;justify-content:center;padding:30px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.lang-inner{width:100%;max-width:440px;text-align:center;padding:8px 0 4px}
.lc-cross{width:60px;height:60px;margin:0 auto 14px;border-radius:50%;background:var(--green);color:#fff;
  display:grid;place-items:center;font-size:29px;box-shadow:var(--shadow)}
.lc-eyebrow{margin:0 0 6px;font-size:14px;font-weight:700;color:var(--green-d);letter-spacing:.2px}
.lc-title{margin:0 0 20px;font-size:29px;font-weight:900;letter-spacing:-.4px}
.lc-prompt{margin:0 0 22px;font-size:18px;font-weight:800;color:var(--ink);line-height:1.4}
.lc-prompt span{display:inline-block;font-size:13.5px;font-weight:600;color:var(--ink-soft);margin-top:3px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lang-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:20px 12px;min-height:106px;
  cursor:pointer;font-family:inherit;color:var(--ink);touch-action:manipulation;
  transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease}
.lang-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.lang-card:active{transform:translateY(0)}
.lang-card.suggested{border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
.lc-flag{font-size:40px;line-height:1}
.lc-name{font-size:16px;font-weight:800}

/* mobile safe-area & sheet */
.wrap{padding-bottom:calc(60px + env(safe-area-inset-bottom))}
.sheet{max-height:88vh;max-height:88dvh}
.sheet-body{padding-bottom:calc(24px + env(safe-area-inset-bottom))}

@media (max-width:560px){
  .lc-title{font-size:26px}
  .lc-flag{font-size:36px}
}
@media (max-width:340px){ .lang-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<!-- ===== 1) 언어 선택 화면 ===== -->
<div id="langScreen" class="lang-screen">
  <div class="lang-inner">
    <div class="lc-cross">✝️</div>
    <p class="lc-eyebrow">58회 국내외성경탐구모임</p>
    <h1 class="lc-title">식당 메뉴 · Menu</h1>
    <p class="lc-prompt">🌐 언어를 선택하세요<br><span>Select your language · 言語を選択</span></p>
    <div class="lang-grid" id="langGrid"></div>
  </div>
</div>

<!-- ===== 2) 메뉴 화면 (언어 선택 후 표시) ===== -->
<div id="menuScreen" class="menu-screen" style="display:none">
  <div class="wrap">
    <header class="top">
      <div class="brand">
        <div class="plate">✝️</div>
        <div class="brand-text">
          <h1 id="title">58회 국내외성경탐구모임</h1>
          <div class="subtitle" id="subtitle">식당 메뉴 설명</div>
        </div>
      </div>
      <button class="lang-btn" id="changeLang" title="언어 변경 / Change language">
        <span class="lang-btn-flag" id="curFlag">🇰🇷</span>
        <span id="curName">한국어</span>
        <span class="caret">▾</span>
      </button>
    </header>

    <section class="greeting" id="greeting">
      <p class="hello" id="greet-hello"></p>
      <p class="msg" id="greet-msg"></p>
    </section>

    <div class="days" id="days"></div>
    <footer class="note" id="footer"></footer>
  </div>
</div>

<!-- 상세 시트 -->
<div class="modal" id="modal">
  <div class="sheet">
    <div class="sheet-head">
      <div class="st" id="modal-title"></div>
      <button class="x" id="modal-close" aria-label="close">✕</button>
    </div>
    <div class="sheet-body" id="modal-body"></div>
  </div>
</div>

<script>

/* ====== 언어 및 UI 사전 (수정하려면 여기서) ====== */
const LANGS = ["ko", "en", "th", "vi", "fr", "es", "de", "ja", "zh"];

/* ====== 요일별 메뉴 (제58회 수양회, 최종) ====== */
const MENU = [{"date": "7/25", "wd": "sat", "lunch": [], "dinner": ["rice", "gomtang", "gaji_beoseot_tangsuyuk", "squid_muchim", "bujigaengi_namul", "gim", "kimchi", "melon"]}, {"date": "7/26", "wd": "sun", "lunch": ["bread_rice", "jam", "potato_cabbage_soup", "donkatsu", "cabbage_cucumber_salad", "kimchi", "pickles", "cheese", "banana"], "dinner": ["samgyetang", "kkakdugi", "myeongi_pickle", "watermelon"]}, {"date": "7/27", "wd": "mon", "lunch": ["bread_rice", "butter_jam", "boiled_potato", "spam_gui", "romaine_shrimp_salad", "gim", "kimchi", "banana"], "dinner": ["rice", "doenjang_soup", "so_bulgogi", "yachae_gui", "lettuce_salad", "asaki_gochu", "ssammu", "gochujang_myeolchi", "chamoe"]}, {"date": "7/28", "wd": "tue", "lunch": ["bread_rice", "jam_oliveoil", "broccoli_soup", "dakbong_gui", "daegu_jeon", "myeolchi_bokkeum", "gim", "kimchi", "apple", "cucumber"], "dinner": ["oi_tomato_naengguk", "bibimbap", "matganjang"]}, {"date": "7/29", "wd": "wed", "lunch": ["bread_rice", "jam", "chicken_veg_soup", "sausage_ketchup", "boiled_egg", "sauerkraut", "ojingeochae", "kimchi", "banana", "tomato_cucumber"], "dinner": ["rice", "beef_seaweed_soup", "godeungeo_gui", "tteokbokki", "chickpea_salad", "oiji_muchim", "yeolmu_kimchi", "watermelon"]}, {"date": "7/30", "wd": "thu", "lunch": ["bread_rice", "jam_oliveoil", "beef_veg_stew", "boiled_potato", "ham_egg_scramble", "caprese_salad", "bokkeum_kimchi", "gim", "banana"], "dinner": ["rice", "yukgaejang", "daegu_jeon", "broccoli", "potato_wedges", "kkakdugi", "kkaennip_kimchi", "tomato"]}];

/* ====== 렌더링 & 상호작용 ====== */
const cur = {lang:"ko"};
const $ = id => document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function tr(k){const d=DISH[k];return (d.t[cur.lang]||d.t.en||d.t.ko);}
function mealTitle(type){return type==="lunch"?UI.lunch[cur.lang]:UI.dinner[cur.lang];}

function detectLang(){
  var n=(navigator.language||navigator.userLanguage||"").slice(0,2).toLowerCase();
  return LANGS.indexOf(n)>=0 ? n : "ko";
}

/* --- 언어 선택 화면 --- */
function buildLangGrid(){
  var g=$("langGrid"); g.innerHTML=""; var det=detectLang();
  LANGS.forEach(function(l){
    var b=document.createElement("button");
    b.className="lang-card"+(l===det?" suggested":"");
    b.setAttribute("lang",l);
    b.innerHTML='<span class="lc-flag">'+UI.flag[l]+'</span><span class="lc-name">'+esc(UI.langName[l])+'</span>';
    b.addEventListener("click",function(){chooseLang(l);});
    g.appendChild(b);
  });
}
function updateLangBtn(){
  $("curFlag").textContent=UI.flag[cur.lang];
  $("curName").textContent=UI.langName[cur.lang];
}
function chooseLang(l){
  cur.lang=l;
  renderStatic(); renderDays(); updateLangBtn();
  $("langScreen").style.display="none";
  $("menuScreen").style.display="block";
  window.scrollTo(0,0);
}
function openLangScreen(){
  $("menuScreen").style.display="none";
  $("langScreen").style.display="flex";
  window.scrollTo(0,0);
}

/* --- 메뉴 렌더 --- */
function renderStatic(){
  var L=cur.lang; document.documentElement.lang=L;
  $("title").textContent=UI.title[L];
  $("subtitle").textContent=UI.subtitle[L];
  $("greet-hello").textContent=UI.hello[L];
  $("greet-msg").textContent=UI.greeting[L];
  $("footer").textContent=UI.footer[L];
}
function mealPanel(di,type,keys){
  var p=document.createElement("div"); p.className="meal "+type;
  var icon = type==="lunch" ? "🌞" : "🌙";
  var html='<div class="meal-head"><span class="m-icon">'+icon+'</span><span class="m-title">'+esc(mealTitle(type))+'</span></div>';
  if(!keys || keys.length===0){
    p.classList.add("tba");
    html+='<div class="tba-txt">'+esc(UI.tba[cur.lang])+'</div>';
    p.innerHTML=html; return p;
  }
  html+='<ul class="dishes">';
  keys.forEach(function(k){ var t=tr(k);
    var warn=(DISH[k].al&&DISH[k].al.length)?'<span class="d-warn" title="'+esc(UI.allergenTitle[cur.lang])+'">⚠️</span>':'';
    html+='<li><span class="d-ico">'+DISH[k].icon+'</span><span class="d-name">'+esc(t.n)+'</span>'+warn+'</li>';
  });
  html+='</ul>';
  html+='<div class="tap-hint">'+esc(UI.tapHint[cur.lang])+' ›</div>';
  p.innerHTML=html;
  p.classList.add("clickable");
  p.setAttribute("role","button"); p.setAttribute("tabindex","0");
  p.addEventListener("click",function(){openModal(di,type);});
  p.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();openModal(di,type);}});
  return p;
}
function renderDays(){
  var root=$("days"); root.innerHTML="";
  MENU.forEach(function(day,di){
    var card=document.createElement("div"); card.className="day";
    var wd=UI.weekday[day.wd][cur.lang];
    card.innerHTML='<div class="day-head"><span class="date">'+esc(day.date)+'</span><span class="wd">'+esc(wd)+'</span></div>';
    var grid=document.createElement("div"); grid.className="meals";
    grid.appendChild(mealPanel(di,"lunch",day.lunch));
    grid.appendChild(mealPanel(di,"dinner",day.dinner));
    card.appendChild(grid); root.appendChild(card);
  });
}
function openModal(di,type){
  var L=cur.lang, day=MENU[di];
  var keys = type==="lunch" ? day.lunch : day.dinner;
  $("modal-title").textContent = day.date+"  ·  "+UI.weekday[day.wd][L]+"  ·  "+mealTitle(type);
  var body=$("modal-body"); body.innerHTML="";
  keys.forEach(function(k){
    var t=tr(k), d=DISH[k];
    var tags=d.tags.map(function(tg){return '<span class="tag">'+TAGICON[tg]+' '+esc(UI.tags[tg][L])+'</span>';}).join("");
    var alg=(d.al&&d.al.length)?d.al.map(function(c){return '<span class="al">'+esc(UI.allergens[c][L])+'</span>';}).join(""):"";
    var alBox=alg?'<div class="allergen-box"><div class="al-title"><span class="al-warn">⚠️</span> '+esc(UI.allergenTitle[L])+'</div><div class="al-list">'+alg+'</div></div>':"";
    var kor = (L==="ko") ? "" : '<div class="dish-kor">'+esc(DISH[k].t.ko.n)+'</div>';
    body.innerHTML +=
      '<div class="dish">'+
        '<div class="dish-top"><span class="dish-ico">'+d.icon+'</span>'+
          '<div><div class="dish-name">'+esc(t.n)+'</div>'+kor+'</div></div>'+
        (tags?'<div class="dish-tags">'+tags+'</div>':'')+
        alBox+
        '<div class="dish-desc">'+esc(t.d)+'</div>'+
        '<div class="dish-ing"><span class="ing-label">'+esc(UI.ingredients[L])+'</span>'+esc(t.i)+'</div>'+
      '</div>';
  });
  body.scrollTop=0;
  $("modal").classList.add("open"); document.body.style.overflow="hidden";
}
function closeModal(){$("modal").classList.remove("open"); document.body.style.overflow="";}

/* init */
buildLangGrid();
$("changeLang").addEventListener("click",openLangScreen);
$("modal-close").addEventListener("click",closeModal);
$("modal").addEventListener("click",function(e){ if(e.target.id==="modal") closeModal(); });
document.addEventListener("keydown",function(e){ if(e.key==="Escape" && $("modal").classList.contains("open")) closeModal(); });
</script>
